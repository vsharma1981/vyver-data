name: Daily Market Data Enrichment

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch market data
        run: python scripts/fetch_data.py

      - name: Commit and push
        run: |
          git config user.name "Vyver Bot"
          git config user.email "bot@vyver.app"
          git add data/
          git diff --staged --quiet || git commit -m "Market data update $(date -u +%Y-%m-%d)"
          git push
